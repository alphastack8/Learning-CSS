<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Alpha Stack 88] — Frontend Developer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. NAVBAR -->
  <header>
    <div class="logo">Alpha Stack</div>
    <nav>
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
     </nav>
  </header>

  <!-- 2. HERO -->
  <section class="hero">
    <h1>Welcome to My Portfolio</h1>
    <p>Aspiring Frontend Developer | Journey</p>
    <div class="hero-btns">
      <a href="#contact" class="btn-primary">Contact Me</a>
      <a href="https://github.com" class="btn-outline">GitHub</a>
    </div>
  </section>
   <!-- 3. ABOUT -->
  <section id="about" class="about">
    <img src="https://www.alphagroup.com/wp-content/uploads/2022/08/Alpha-Logo.png" alt="Profile">
    <div>
      <h2>About Me</h2>
    </div>
  </section>
   <!-- 4. SKILLS -->
  <section id="skills">
    <h2>My Skills</h2>
    <div class="skills-grid">
      <div class="skill-card">HTML</div>
      <div class="skill-card">CSS</div>
      <div class="skill-card">Flexbox</div>
      <div class="skill-card">CSS Grid</div>
      <div class="skill-card">Git</div>
      <div class="skill-card">VS Code</div>
    </div>
  </section>
  <!-- 5. CONTACT -->
  <section id="contact">
    <h2>Contact </h2>
    <form>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Email address">
      <textarea rows="4" placeholder="Message..."></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 [Naam] | Week 1 Complete!</p>
  </footer>

</body>
</html>
